<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>API 测试</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
    .test-box { background: #f5f5f5; padding: 20px; margin: 20px 0; border-radius: 8px; }
    button { padding: 10px 20px; font-size: 16px; cursor: pointer; margin: 5px; }
    #result { background: #000; color: #0f0; padding: 15px; border-radius: 5px; overflow-x: auto; font-family: monospace; white-space: pre-wrap; }
    .success { color: #0f0; }
    .error { color: #f00; }
  </style>
</head>
<body>
  <h1>🔧 AI API 测试工具</h1>
  
  <div class="test-box">
    <h3>API 地址</h3>
    <input id="apiUrl" value="https://paw-patrol-ai.812217700.workers.dev" style="width: 100%; padding: 10px; font-size: 14px;">
  </div>
  
  <div class="test-box">
    <h3>测试按钮</h3>
    <button onclick="testHealth()">1. 测试健康检查</button>
    <button onclick="testGenerate()">2. 测试图片生成</button>
    <button onclick="testCORS()">3. 测试 CORS 预检</button>
  </div>
  
  <div class="test-box">
    <h3>结果</h3>
    <div id="result">点击按钮开始测试...</div>
  </div>
  
  <div class="test-box">
    <h3>生成的图片</h3>
    <div id="imageResult"></div>
  </div>

  <script>
    function log(msg, isError = false) {
      const result = document.getElementById('result');
      const time = new Date().toLocaleTimeString();
      result.innerHTML += `\n[${time}] ${msg}`;
      if (isError) {
        result.innerHTML = result.innerHTML.replace(msg, `<span class="error">${msg}</span>`);
      }
    }

    async function testHealth() {
      const url = document.getElementById('apiUrl').value;
      log('测试健康检查...');
      try {
        const response = await fetch(url + '/');
        log(`状态码: ${response.status}`);
        const data = await response.json();
        log(`响应: ${JSON.stringify(data, null, 2)}`);
      } catch (error) {
        log(`错误: ${error.message}`, true);
      }
    }

    async function testCORS() {
      const url = document.getElementById('apiUrl').value;
      log('测试 CORS 预检...');
      try {
        const response = await fetch(url + '/api/generate-pet', {
          method: 'OPTIONS',
          headers: {
            'Origin': window.location.origin,
            'Access-Control-Request-Method': 'POST'
          }
        });
        log(`预检状态码: ${response.status}`);
        log(`CORS 头: ${JSON.stringify(Object.fromEntries(response.headers), null, 2)}`);
      } catch (error) {
        log(`错误: ${error.message}`, true);
      }
    }

    async function testGenerate() {
      const url = document.getElementById('apiUrl').value;
      log('开始生成图片...');
      try {
        log('发送请求到: ' + url + '/api/generate-pet');
        
        const response = await fetch(url + '/api/generate-pet', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            prompt: '可爱的小狗',
            petName: '测试宠物'
          })
        });
        
        log(`状态码: ${response.status}`);
        
        const data = await response.json();
        log(`响应: ${JSON.stringify(data, null, 2)}`);
        
        if (data.success && data.imageUrl) {
          document.getElementById('imageResult').innerHTML = 
            `<img src="${data.imageUrl}" style="max-width: 100%; border-radius: 8px;">`;
          log('✅ 图片生成成功！');
        } else {
          log(`❌ 生成失败: ${data.error}`, true);
        }
      } catch (error) {
        log(`❌ 错误: ${error.message}`, true);
        log(`错误堆栈: ${error.stack}`, true);
      }
    }
  </script>
</body>
</html>
