<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>汪汪队 AI 换宠测试</title>
<style>
  body { 
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    max-width: 600px; margin: 50px auto; padding: 20px;
    background: #1a1a2e; color: #fff;
  }
  h1 { color: #00ffff; text-align: center; }
  .box { 
    background: rgba(255,255,255,0.1); 
    padding: 20px; margin: 15px 0; 
    border-radius: 12px;
    border: 1px solid rgba(0,255,255,0.3);
  }
  button { 
    width: 100%; padding: 15px; font-size: 16px; 
    cursor: pointer; margin: 10px 0;
    background: linear-gradient(135deg, #00ffff, #0077ff);
    border: none; border-radius: 8px; color: #000;
    font-weight: bold;
  }
  button:hover { opacity: 0.9; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  #result { 
    background: #000; color: #0f0; padding: 15px; 
    border-radius: 8px; font-family: monospace;
    font-size: 12px; white-space: pre-wrap; max-height: 300px;
    overflow-y: auto;
  }
  #imageResult img { 
    max-width: 100%; border-radius: 12px; 
    margin-top: 15px;
  }
  .error { color: #ff4444; }
  .success { color: #00ff00; }
  select, input { 
    width: 100%; padding: 12px; margin: 10px 0;
    border-radius: 8px; border: 1px solid #00ffff;
    background: rgba(0,0,0,0.5); color: #fff;
  }
</style>
</head>
<body>
  <h1>🐕 汪汪队 AI 换宠</h1>
  
  <div class="box">
    <h3>选择宠物类型</h3>
    <select id="petType">
      <option value="消防犬毛毛">🔥 消防犬毛毛（达尔马提亚犬）</option>
      <option value="警犬阿奇">👮 警犬阿奇（德国牧羊犬）</option>
      <option value="工程犬小砾">🚧 工程犬小砾（英国斗牛犬）</option>
      <option value="医护犬灰灰">💚 医护犬灰灰（混种犬）</option>
      <option value="水上救援犬路马">🌊 水上救援犬路马（拉布拉多犬）</option>
      <option value="航空犬天天">🚁 航空犬天天（可卡犬）</option>
      <option value="丛林救援犬 Tracker">🌴 丛林救援犬 Tracker（吉娃娃）</option>
      <option value="雪山救援犬 Everest">❄️ 雪山救援犬 Everest（哈士奇）</option>
    </select>
    
    <h3>自定义描述（可选）</h3>
    <input id="description" placeholder="例如：穿着超级英雄服装的毛毛">
  </div>
  
  <div class="box">
    <button onclick="generatePet()" id="generateBtn">
      🎨 开始生成 AI 宠物图片
    </button>
  </div>
  
  <div class="box">
    <h3>生成结果</h3>
    <div id="result">等待生成...</div>
    <div id="imageResult"></div>
  </div>

  <script>
    // API 地址配置
    const API_URLS = [
      'https://paw-patrol-ai.812217700.workers.dev',  // Cloudflare Workers
      // 如果上面的不可用，会尝试本地服务器
    ];
    
    let currentUrlIndex = 0;
    
    function log(msg, isError = false) {
      const result = document.getElementById('result');
      const time = new Date().toLocaleTimeString();
      const color = isError ? 'error' : 'success';
      result.innerHTML += `<span class="${color}">[${time}] ${msg}</span>\n`;
      result.scrollTop = result.scrollHeight;
    }
    
    async function tryApiRequest(endpoint, data) {
      const url = `${API_URLS[currentUrlIndex]}${endpoint}`;
      log(`尝试: ${url}`);
      
      try {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 30000);
        
        const response = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data),
          signal: controller.signal,
        });
        
        clearTimeout(timeoutId);
        
        if (!response.ok) {
          const text = await response.text();
          throw new Error(`HTTP ${response.status}: ${text}`);
        }
        
        return await response.json();
      } catch (error) {
        // 如果当前 URL 失败，尝试下一个
        if (currentUrlIndex < API_URLS.length - 1) {
          currentUrlIndex++;
          log(`切换到备用地址...`);
          return tryApiRequest(endpoint, data);
        }
        throw error;
      }
    }
    
    async function generatePet() {
      const btn = document.getElementById('generateBtn');
      const petType = document.getElementById('petType').value;
      const description = document.getElementById('description').value;
      
      btn.disabled = true;
      btn.textContent = '⏳ 生成中，请稍候...';
      document.getElementById('result').innerHTML = '';
      document.getElementById('imageResult').innerHTML = '';
      
      log('开始生成 AI 宠物图片...');
      log(`宠物类型: ${petType}`);
      
      const prompt = description 
        ? `${petType}，${description}，汪汪队立大功风格`
        : `汪汪队立大功风格的${petType}，可爱卡通形象，电影级3D风格`;
      
      try {
        log('正在调用 AI API...');
        
        const data = await tryApiRequest('/api/generate-pet', {
          prompt: prompt,
          petName: petType,
          style: '电影级3D卡通风格'
        });
        
        if (data.success && data.imageUrl) {
          log('✅ 生成成功！');
          document.getElementById('imageResult').innerHTML = `
            <img src="${data.imageUrl}" alt="AI生成的${petType}">
            <p style="text-align:center;margin-top:10px;">
              <a href="${data.imageUrl}" target="_blank" style="color:#00ffff;">
                🔗 查看原图
              </a>
            </p>
          `;
        } else {
          throw new Error(data.error || '生成失败');
        }
      } catch (error) {
        log(`❌ 错误: ${error.message}`, true);
        
        if (error.message.includes('Failed to fetch') || error.message.includes('abort')) {
          log('', true);
          log('💡 提示：网络请求失败，可能的原因：', true);
          log('1. Cloudflare Workers 在您的网络环境下无法访问', true);
          log('2. 请尝试使用 VPN 或切换网络', true);
          log('', true);
          log('如果问题持续，请联系开发者获取帮助', true);
        }
      } finally {
        btn.disabled = false;
        btn.textContent = '🎨 开始生成 AI 宠物图片';
        currentUrlIndex = 0; // 重置
      }
    }
  </script>
</body>
</html>
